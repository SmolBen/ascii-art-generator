<!DOCTYPE html>
<html>
    <head>
        <title>ASCII Art Generator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1> ASCII Art Generator</h1>
        <input type="file" id ="imageInput" accept="image/*">

        <div id="controls">
            <label>Brightness: <input type="range" id="brightness" min="-100" max="100" value="0"> <span id="brightnessVal">0</span></label>
            <label>Contrast: <input type="range" id="contrast" min="-100" max="100" value="0"> <span id="contrastVal">0</span></label>
            <label>Resolution: <input type="range" id="resolution" min="2" max="20" value="8"> <span id="resolutionVal">8</span></label>
            <label>Characters: <input type="text" id="charRamp" value="@%#*+=:. "> <button id="resetRamp">Reset</button></label>
        </div>

        <div id="export">
            <button id="copyBtn">Copy to Clipboard</button>
            <button id="saveBtn">Save as .txt</button>
        </div>

        <img id="preview" src="">
        
        <div id="main">
            <canvas id ="canvas"></canvas>
            <pre id="asciiOutput"></pre>
        </div>
        <script src="renderer.js"></script>
    </body>
</html>
