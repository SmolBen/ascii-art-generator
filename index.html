<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ASCII Art Generator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="app">
            <div id="sidebar">
                <h1>ASCII Art Generator</h1>
                <img id="preview" src="">
                <button id="loadBtn">Load Image</button>
                <input type="file" id="imageInput" accept="image/*" style="display:none;">
                <div id="controls">
                    <label>Brightness: <input type="range" id="brightness" min="-100" max="100" value="0"> <span id="brightnessVal">0</span></label>
                    <label>Contrast: <input type="range" id="contrast" min="-100" max="100" value="0"> <span id="contrastVal">0</span></label>
                    <label>Scale: <input type="range" id="resolution" min="1" max="50" value="15"> <span id="resolutionVal">15</span></label>
                    <label>Characters:</label>
                    <div style="display:flex; gap:4px;">
                        <input type="text" id="charRamp" value="@%#*+=:. " style="flex:1; box-sizing:border-box;">
                        <button id="resetRamp">Reset</button>
                    </div>
                </div>
                <div id="style-controls">
                    <label>Text Color: <input type="color" id="textColor" value="#33ff33"></label>
                    <label>Glow Color: <input type="color" id="glowColor" value="#33ff33"></label>
                    <label>Glow Intensity: <input type="range" id="glowIntensity" min="0" max="20" value="0"> <span id="glowVal">0</span></label>
                    <label>Background: <input type="color" id="bgColor" value="#0a0a0a"></label>
                </div>
                <div id="export">
                    <button id="copyBtn">Copy to Clipboard</button>
                    <button id="saveBtn">Save as .txt</button>
                    <button id="saveImgBtn">Save as SVG</button>
                </div>
            </div>
            <div id="canvas-area">
                <canvas id="canvas"></canvas>
                <pre id="asciiOutput"></pre>
            </div>
        </div>
        <script src="converter.js"></script>
        <script src="renderer.js"></script>
    </body>
</html>
